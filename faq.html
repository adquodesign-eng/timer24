let fCat='alle', fQ='';

function renderPage(){
  const d=FD[cl]||FD.de;
  document.title='FAQ – Timer-24.com';
  const tabs=Object.entries(d.cats).map(([k,v])=>`<button class="ft${k===fCat?' on':''}" onclick="fSetCat('${k}')">${v}</button>`).join('');
  const items=d.items.filter(f=>(fCat==='alle'||f.c===fCat)&&(!fQ||f.q.toLowerCase().includes(fQ)||f.a.toLowerCase().includes(fQ)));
  const list=items.map((f,i)=>`<div class="fi"><div class="fq" onclick="togF(${i})" id="fq${i}"><span>${f.q}</span><span class="fc" id="fc${i}">▼</span></div><div class="fa" id="fa${i}">${f.a}</div></div>`).join('');
  document.getElementById('pm').innerHTML=`
    <div class="ph"><h1>${d.h1}</h1><p>${d.sub}</p></div>
    <div style="position:relative;max-width:420px;margin-bottom:20px">
      <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--mut)">🔍</span>
      <input type="text" placeholder="${d.search}" oninput="fSrch(this.value)" style="width:100%;padding:10px 14px 10px 38px;border:1px solid var(--brd);border-radius:var(--r);background:var(--sur);font-family:system-ui,sans-serif;font-size:14px;color:var(--txt);outline:none;">
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px">${tabs}</div>
    ${items.length?`<div class="fl2">${list}</div>`:`<div style="text-align:center;padding:40px;color:var(--mut)">${d.noRes}</div>`}
  `;
}
function fSetCat(c){fCat=c;renderPage();}
function fSrch(q){fQ=q.toLowerCase();renderPage();}
function togF(i){
  const q=document.getElementById('fq'+i),a=document.getElementById('fa'+i),c=document.getElementById('fc'+i);
  const open=a.classList.contains('open');
  document.querySelectorAll('.fa.open').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.fq.open').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('.fc').forEach(el=>el.style.transform='');
  if(!open){a.classList.add('open');q.classList.add('open');c.style.transform='rotate(180deg)';}
}


cl=getLang();buildLM();applyNav();renderPage();
