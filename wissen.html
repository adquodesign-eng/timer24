.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--txt);font-weight:800;font-size:18px;flex-shrink:0;}
.logo-i{width:32px;height:32px;background:linear-gradient(135deg,var(--bl),#0088dd);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;}
.logo em{color:var(--bl);font-style:normal;}
.navl{display:flex;gap:5px;align-items:center;flex:1;}
.navl a{padding:6px 11px;border-radius:var(--rs);text-decoration:none;font-size:13px;font-weight:500;color:var(--mut);transition:all var(--t);white-space:nowrap;}
.navl a:hover,.navl a.act{color:var(--bl);background:var(--bls);}
.navl .nb{background:var(--bl);color:#fff!important;font-weight:700!important;}
.lw{position:relative;margin-left:auto;flex-shrink:0;}
.lb{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--sur);cursor:pointer;font-family:system-ui,sans-serif;font-size:13px;font-weight:700;color:var(--txt);transition:all var(--t);}
.lb:hover{border-color:var(--bl);color:var(--bl);}
.lm{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--sur);border:1px solid var(--brd);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.13);list-style:none;padding:6px;min-width:158px;z-index:9999;max-height:340px;overflow-y:auto;}
[dir=rtl] .lm{right:auto;left:0;}
.lm.open{display:block;}
.lm li{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:background var(--t);}
.lm li:hover{background:var(--bg);}
.lm li.sel{color:var(--bl);background:var(--bls);font-weight:700;}
main{max-width:900px;margin:0 auto;padding:32px 20px 60px;}
.ph{margin-bottom:32px;}
.ph h1{font-size:clamp(22px,5vw,36px);font-weight:800;margin-bottom:8px;letter-spacing:-.5px;}
.ph p{font-size:15px;color:var(--mut);line-height:1.6;max-width:540px;}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);box-shadow:var(--sh);}
.card-body{padding:22px;}
h2{font-size:16px;font-weight:700;color:var(--bl);margin:18px 0 8px;}
p{font-size:14px;color:var(--mut);line-height:1.7;margin-bottom:9px;}
p:last-child{margin-bottom:0;}
p strong{color:var(--txt);}
a{color:var(--bl);text-decoration:none;}
a:hover{text-decoration:underline;}
ul{padding-left:18px;margin-bottom:9px;}
li{font-size:14px;color:var(--mut);line-height:1.7;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--sur);cursor:pointer;font-family:system-ui,sans-serif;font-size:13px;font-weight:500;color:var(--txt);transition:all var(--t);}
.btn:hover{border-color:var(--bl);color:var(--bl);}
.btn-p{background:var(--bl);border-color:var(--bl);color:#fff!important;}
.btn-p:hover{background:#0095ee;}
footer{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--brd);padding:8px 16px;text-align:center;font-size:12px;color:var(--mut);z-index:90;}
footer a{color:var(--mut);text-decoration:none;margin:0 5px;}
footer a:hover{color:var(--bl);}
@media(max-width:640px){.navl{display:none;}.hi{padding:0 14px;}main{padding:20px 14px 60px;}}

.sb{position:relative;margin-bottom:20px;}
.fts button.ft{padding:6px 14px;border:1px solid var(--brd);border-radius:20px;background:var(--sur);cursor:pointer;font-size:12px;font-weight:600;color:var(--mut);transition:all var(--t);font-family:system-ui,sans-serif;}
.fts button.ft:hover,.fts button.ft.on{background:var(--bl);border-color:var(--bl);color:#fff;}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px;}
.ac{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:18px;text-decoration:none;color:var(--txt);box-shadow:var(--sh);transition:all var(--t);display:flex;flex-direction:column;gap:7px;}
.ac:hover{border-color:var(--bl);box-shadow:var(--shm);transform:translateY(-2px);}
.acat{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
.cat-timer{background:var(--bls);color:var(--bl);}
.cat-prod{background:var(--cus);color:var(--cu);}
.cat-lernen{background:#F0FDF4;color:#16A34A;}
.cat-gesund{background:#FFF7ED;color:#EA580C;}

.at{font-size:14px;font-weight:700;line-height:1.3;}
.ad{font-size:12px;color:var(--mut);line-height:1.5;flex:1;}
.am{display:flex;align-items:center;justify-content:space-between;margin-top:3px;font-size:11px;color:var(--mut);}

let curCat='alle', curQ='';

function renderPage(){
  const d=PD[cl]||PD.de;
  document.title='Wissenswertes – Timer-24.com';
  // update search placeholder
  const si=document.getElementById('si');if(si)si.placeholder=d.search;
  // build filter tabs
  const tabs=Object.entries(d.cats).map(([k,v])=>`<button class="ft${k===curCat?' on':''}" onclick="setCat('${k}',this)">${v}</button>`).join('');
  // filter articles
  const arts=d.arts.filter(a=>(curCat==='alle'||a.c===curCat)&&(!curQ||a.t.toLowerCase().includes(curQ)||a.d.toLowerCase().includes(curQ)));
  const grid=arts.map(a=>`<a href="#" class="ac" onclick="return false">
    <span class="acat cat-${a.c}">${d.cats[a.c]||a.c}</span>
    <div class="at">${a.i} ${a.t}</div>
    <div class="ad">${a.d}</div>
    <div class="am"><span>⏱ ${a.r} ${d.read}</span><span style="color:var(--bl)">→</span></div>
  </a>`).join('');
  document.getElementById('pm').innerHTML=`
    <div class="ph"><h1>${d.h1}</h1><p>${d.sub}</p></div>
    <div class="sb"><span style="font-size:15px;position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--mut)">🔍</span>
      <input id="si" type="text" placeholder="${d.search}" oninput="srch(this.value)" style="width:100%;max-width:420px;padding:10px 14px 10px 40px;border:1px solid var(--brd);border-radius:var(--r);background:var(--sur);font-family:system-ui,sans-serif;font-size:14px;color:var(--txt);outline:none;">
    </div>
    <div class="fts" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px">${tabs}</div>
    ${arts.length?`<div class="ag">${grid}</div>`:`<div style="text-align:center;padding:48px 20px;color:var(--mut)">${d.noRes}</div>`}
  `;
}
function setCat(c,btn){curCat=c;renderPage();}
function srch(q){curQ=q.toLowerCase();renderPage();}


cl=getLang();buildLM();applyNav();renderPage();
