.hi{max-width:900px;margin:0 auto;padding:0 18px;height:60px;display:flex;align-items:center;gap:12px;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--txt);font-weight:800;font-size:18px;flex-shrink:0;}

.logo em{color:var(--bl);font-style:normal;}
.navl{display:flex;gap:4px;align-items:center;}
.navl a{padding:6px 10px;border-radius:var(--rs);text-decoration:none;font-size:13px;font-weight:500;color:var(--mut);white-space:nowrap;transition:all var(--t);}
.navl a:hover,.navl a.act{color:var(--bl);background:var(--bls);}
/* Language select */
.lang-sel-wrap{margin-left:auto;flex-shrink:0;}
#lang-select{padding:6px 10px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--sur);font-family:system-ui,sans-serif;font-size:13px;font-weight:700;color:var(--txt);cursor:pointer;outline:none;transition:border-color var(--t);}
#lang-select:hover,#lang-select:focus{border-color:var(--bl);}
main{max-width:900px;margin:0 auto;padding:28px 18px 60px;}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:26px 30px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
h1{font-size:1.55rem;font-weight:800;margin-bottom:6px;}
h2{font-size:1.05rem;font-weight:700;margin:20px 0 8px;color:var(--bl);}
h2:first-child{margin-top:0;}
h3{font-size:.95rem;font-weight:700;margin:14px 0 6px;}
p{font-size:.9rem;line-height:1.8;margin-bottom:10px;color:var(--mut);}
p:last-child{margin-bottom:0;}
p strong{color:var(--txt);}
a{color:var(--bl);text-decoration:none;}
a:hover{text-decoration:underline;}
ul,ol{padding-left:18px;margin-bottom:10px;}
li{font-size:.88rem;line-height:1.7;color:var(--mut);}
.meta{font-size:.78rem;color:var(--mut);margin-bottom:18px;}
.info-box{background:var(--bls);border-left:3px solid var(--bl);border-radius:0 6px 6px 0;padding:10px 14px;margin:12px 0;font-size:.85rem;line-height:1.6;color:var(--txt);}
/* Cookie */
#ck{display:none;position:fixed;bottom:0;left:0;right:0;background:#1F2937;padding:14px 22px;z-index:1000;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;box-shadow:0 -2px 12px rgba(0,0,0,.2);}
#ck p{font-size:.82rem;flex:1 1 240px;margin:0;color:rgba(255,255,255,.88);line-height:1.5;}
#ck p a{color:#93C5FD;text-decoration:underline;}
.ck-b{display:flex;gap:8px;flex-shrink:0;}
#ck-ok{padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-family:system-ui,sans-serif;font-size:.82rem;font-weight:700;background:var(--bl);color:#fff;}
#ck-no{padding:8px 14px;border-radius:6px;cursor:pointer;font-family:system-ui,sans-serif;font-size:.82rem;font-weight:600;background:transparent;color:#9CA3AF;border:1px solid #4B5563;}
footer{position:fixed;bottom:0;left:0;right:0;background:var(--sur);border-top:1px solid var(--brd);padding:7px 16px;text-align:center;font-size:11.5px;color:var(--mut);z-index:90;}
footer a{color:var(--mut);text-decoration:none;margin:0 4px;}
footer a:hover{color:var(--bl);}
@media(max-width:620px){.navl{display:none;}.hi{padding:0 12px;}main{padding:18px 12px 60px;}}

function getLang() {
  try {
    const p = new URLSearchParams(window.location.search);
    const q = p.get('lang');
    if (q && NAV_I18N[q]) return q;
  } catch(e) {}
  const s = localStorage.getItem('t24_lang');
  if (s && NAV_I18N[s]) return s;
  const b = (navigator.language || 'de').slice(0, 2).toLowerCase();
  return NAV_I18N[b] ? b : 'de';
}

function setLang(l) {
  if (!NAV_I18N[l]) return;
  localStorage.setItem('t24_lang', l);
  try {
    const u = new URL(window.location.href);
    u.searchParams.set('lang', l);
    history.replaceState(null, '', u.toString());
  } catch(e) {}
  applyNav(l);
  if (typeof renderPage === 'function') renderPage(l);
}

function applyNav(lang) {
  const t = NAV_I18N[lang] || NAV_I18N['de'];
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  const sel = document.getElementById('lang-select');
  if (sel) sel.value = lang;
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });
  // Cookie banner
  const ckP = document.getElementById('ck-p');
  const dsLink = document.getElementById('ck-ds-link');
  if (ckP && dsLink) {
    ckP.firstChild.textContent = (t.ck_txt || '') + ' ';
    dsLink.textContent = t.datenschutz || 'Datenschutz';
    dsLink.href = 'datenschutz.html?lang=' + lang;
  }
  const okBtn = document.getElementById('ck-ok');
  const noBtn = document.getElementById('ck-no');
  if (okBtn) okBtn.textContent = t.ck_ok || 'Alle akzeptieren';
  if (noBtn) noBtn.textContent = t.ck_no || 'Nur notwendige';
}

function acceptCookies(v) {
  localStorage.setItem('cookie-consent', v);
  document.getElementById('ck').style.display = 'none';
}
if (!localStorage.getItem('cookie-consent'))
  document.getElementById('ck').style.display = 'flex';
