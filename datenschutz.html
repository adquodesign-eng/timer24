.lang-menu.open{display:block;}
.lang-menu li{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;}
.lang-menu li:hover{background:var(--bg-deep);}
.lang-menu li.sel{color:var(--blue-bright);background:var(--blue-soft);font-weight:700;}
main{max-width:760px;margin:32px auto;padding:0 20px;}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:28px 32px;margin-bottom:20px;}
h1{font-size:1.6rem;font-weight:800;margin-bottom:6px;}
h2{font-size:1.05rem;font-weight:700;margin:20px 0 8px;color:var(--blue-bright);}
p{font-size:.9rem;line-height:1.8;margin-bottom:10px;color:var(--muted);}
p strong{color:var(--text);}
a{color:var(--blue-bright);text-decoration:none;}
a:hover{text-decoration:underline;}
.meta{font-size:.78rem;color:var(--muted);margin-bottom:20px;}
ul{padding-left:18px;margin-bottom:10px;}
li{font-size:.88rem;line-height:1.7;color:var(--muted);}
.info-box{background:var(--blue-soft);border-left:3px solid var(--blue-bright);border-radius:0 6px 6px 0;padding:10px 14px;margin:12px 0;font-size:.85rem;line-height:1.6;color:var(--text);}
footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:8px 16px;text-align:center;font-size:.72rem;color:var(--muted);z-index:90;}
footer a{color:var(--muted);text-decoration:none;margin:0 5px;}
footer a:hover{color:var(--blue-bright);}
#ck{display:none;position:fixed;bottom:44px;left:0;right:0;background:#1F2937;color:#fff;padding:12px 20px;z-index:200;align-items:center;flex-wrap:wrap;gap:12px;}
#ck p{font-size:.8rem;flex:1 1 260px;margin:0;color:#fff;}
#ck button{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-family:system-ui,sans-serif;font-size:.82rem;font-weight:700;}
#ck-ok{background:var(--blue-bright);color:#fff;}
#ck-no{background:transparent;color:#9ca3af;border:1px solid #4b5563 !important;}
@media(max-width:600px){.card{padding:20px 16px;}main{padding:0 14px;}}

// ── Lang ──
function buildLangMenu(){document.getElementById('langMenu').innerHTML=Object.entries(LANGS).map(([k,v])=>`<li class="${k===cl?'sel':''}" onclick="setLang('${k}')">${v.f} ${v.n}</li>`).join('');}
function toggleLang(){document.getElementById('langMenu').classList.toggle('open');}
document.addEventListener('click',e=>{if(!e.target.closest('#langWrap'))document.getElementById('langMenu').classList.remove('open');});

let cl='de';
function getLang(){const u=new URLSearchParams(location.search).get('lang');const s=localStorage.getItem('t24_lang');const b=(navigator.language||'de').slice(0,2).toLowerCase();return[u,s,b].find(x=>x&&LANGS[x])||'de';}
function setLang(lang){cl=lang;localStorage.setItem('t24_lang',lang);const u=new URL(location);u.searchParams.set('lang',lang);history.replaceState({},'',u);applyAll();document.getElementById('langMenu').classList.remove('open');}
function applyAll(){
  const t=NAV[cl]||NAV.de;
  document.documentElement.lang=cl;document.documentElement.dir=cl==='ar'?'rtl':'ltr';
  document.getElementById('langBtn').textContent=`${LANGS[cl].f} ${cl.toUpperCase()} ▼`;
  document.getElementById('nav-timer').textContent=t.timer;
  document.getElementById('nav-wissen').textContent=t.wissen;
  document.getElementById('nav-faq').textContent=t.faq;
  document.getElementById('fl-timer').textContent=t.timer;
  document.getElementById('fl-wissen').textContent=t.wissen;
  document.getElementById('fl-faq').textContent=t.faq;
  document.getElementById('fl-hilfe').textContent=t.hilfe;
  document.getElementById('fl-impressum').textContent=t.impressum;
  document.getElementById('fl-datenschutz').textContent=t.datenschutz;
  document.getElementById('fl-copy').textContent=t.copy;
  document.getElementById('ck-text').textContent=t.ck[0];
  document.getElementById('ck-ok').textContent=t.ck[1];
  document.getElementById('ck-no').textContent=t.ck[2];
  renderPage();buildLangMenu();
}
function renderPage(){
  const d=PAGE_DATA[cl]||PAGE_DATA.en;
  document.title=`${d.title} – Timer-24.com`;
  document.getElementById('page-main').innerHTML=`<div class="card"><h1>${d.title}</h1><p class="meta">${d.subtitle}</p>${d.sections.map(s=>`<h2>${s.h}</h2>${s.body}`).join('')}</div>`;
}

cl=getLang();buildLangMenu();applyAll();
</script>
